name: Main workflow

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - "**.md"
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "**.md"

jobs:
  plugin_test:
    strategy:
      fail-fast: false
      matrix:
        version:
          - 5.1.5
          - 5.2.4
          - 5.3.6
          - 5.4.7
          - 5.4.8
          - 5.5.0

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system packages on Ubuntu
        run: sudo apt-get install curl

      - name: Test plugin
        uses: asdf-vm/actions/plugin-test@v1
        with:
          command: lua -v
          version: ${{ matrix.version }}

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: shellcheck bin/* lib/*
